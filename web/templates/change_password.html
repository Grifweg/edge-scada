<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edge SCADA — Change Password</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">

  <div class="login-wrap">

    <div class="login-brand">CHANGE PASSWORD</div>
    <div class="login-sub">ACCOUNT: {{ current_user.username.upper() }}</div>

    {% if current_user.must_change_password %}
    <div class="login-notice">
      You must set a new password before continuing.
    </div>
    {% endif %}

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form class="login-form" method="POST" action="/change-password">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <label class="cfg-lbl" for="cp-new">NEW PASSWORD</label>
      <input class="cfg-inp login-inp" id="cp-new" name="new_password"
             type="password" autocomplete="new-password" required autofocus
             minlength="8">

      <label class="cfg-lbl login-lbl-pw" for="cp-confirm">CONFIRM PASSWORD</label>
      <input class="cfg-inp login-inp" id="cp-confirm" name="confirm_password"
             type="password" autocomplete="new-password" required minlength="8">

      <button class="login-btn" type="submit">SET PASSWORD</button>
    </form>

    {% if not current_user.must_change_password %}
    <a class="login-back" href="/">&larr; BACK TO DASHBOARD</a>
    {% endif %}

  </div>

</body>
</html>
